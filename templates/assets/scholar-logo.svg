<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1E3A5F" stroke="#C8A84E" stroke-width="2"/>

  <!-- Body / Robes -->
  <path d="M35 95 C35 72, 42 65, 60 62 C78 65, 85 72, 85 95" fill="#C8A84E"/>
  <path d="M40 95 C40 75, 46 68, 60 65 C74 68, 80 75, 80 95" fill="#B8942E"/>
  <!-- Robe center line -->
  <line x1="60" y1="65" x2="60" y2="95" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Robe collar / V-neck -->
  <path d="M52 65 L60 75 L68 65" fill="none" stroke="#8B6914" stroke-width="1.5"/>

  <!-- Neck -->
  <rect x="55" y="52" width="10" height="12" rx="3" fill="#B07D4A"/>

  <!-- Face -->
  <ellipse cx="60" cy="42" rx="16" ry="18" fill="#C4915A"/>

  <!-- Beard -->
  <path d="M47 48 C47 62, 53 68, 60 70 C67 68, 73 62, 73 48 C70 50, 65 52, 60 52 C55 52, 50 50, 47 48Z" fill="#2C2C2C"/>

  <!-- Eyes -->
  <ellipse cx="52" cy="40" rx="2.5" ry="2" fill="#1a1a1a"/>
  <ellipse cx="68" cy="40" rx="2.5" ry="2" fill="#1a1a1a"/>
  <!-- Eyebrows -->
  <path d="M48 36 Q52 33, 56 36" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
  <path d="M64 36 Q68 33, 72 36" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>

  <!-- Turban -->
  <path d="M42 38 C40 28, 45 18, 60 16 C75 18, 80 28, 78 38 C75 30, 68 25, 60 24 C52 25, 45 30, 42 38Z" fill="#D4A94E"/>
  <path d="M44 36 C43 28, 48 20, 60 18 C72 20, 77 28, 76 36" fill="#E8C547" stroke="none"/>
  <!-- Turban folds -->
  <path d="M48 32 Q60 28, 72 32" stroke="#C8A84E" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M46 28 Q60 23, 74 28" stroke="#C8A84E" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Turban top wrap -->
  <ellipse cx="60" cy="18" rx="10" ry="4" fill="#D4A94E"/>
  <!-- Gem on turban -->
  <circle cx="60" cy="30" r="3.5" fill="#9B59B6"/>
  <circle cx="60" cy="30" r="2" fill="#C39BD3" opacity="0.7"/>
  <circle cx="59" cy="29" r="0.8" fill="white" opacity="0.8"/>

  <!-- Left hand: Book -->
  <g transform="translate(22, 70) rotate(-15)">
    <rect x="0" y="0" width="16" height="12" rx="1" fill="#D4A574" stroke="#8B6914" stroke-width="0.8"/>
    <line x1="8" y1="0" x2="8" y2="12" stroke="#8B6914" stroke-width="0.5"/>
    <!-- Book pages -->
    <line x1="3" y1="3" x2="7" y2="3" stroke="#6B4226" stroke-width="0.5" opacity="0.5"/>
    <line x1="3" y1="5" x2="7" y2="5" stroke="#6B4226" stroke-width="0.5" opacity="0.5"/>
    <line x1="3" y1="7" x2="7" y2="7" stroke="#6B4226" stroke-width="0.5" opacity="0.5"/>
    <line x1="9" y1="3" x2="13" y2="3" stroke="#6B4226" stroke-width="0.5" opacity="0.5"/>
    <line x1="9" y1="5" x2="13" y2="5" stroke="#6B4226" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Sparkles near book -->
  <circle cx="28" cy="62" r="1.5" fill="#A78BFA" opacity="0.8"/>
  <circle cx="24" cy="58" r="1" fill="#67E8F9" opacity="0.7"/>
  <circle cx="32" cy="58" r="1.2" fill="#F0ABFC" opacity="0.7"/>

  <!-- Right hand: Tablet -->
  <g transform="translate(80, 68) rotate(10)">
    <rect x="0" y="0" width="18" height="14" rx="2" fill="#334155" stroke="#475569" stroke-width="0.8"/>
    <!-- Screen -->
    <rect x="1.5" y="1.5" width="15" height="11" rx="1" fill="#1E293B"/>
    <!-- KI text on screen -->
    <text x="9" y="8" font-family="monospace" font-size="4" fill="#67E8F9" text-anchor="middle" font-weight="bold">KI</text>
    <!-- Data dots on screen -->
    <circle cx="5" cy="5" r="0.8" fill="#34D399"/>
    <circle cx="7" cy="9" r="0.8" fill="#F59E0B"/>
    <circle cx="13" cy="5" r="0.8" fill="#60A5FA"/>
    <!-- Connection lines -->
    <line x1="5" y1="5" x2="9" y2="7" stroke="#475569" stroke-width="0.3"/>
    <line x1="13" y1="5" x2="9" y2="7" stroke="#475569" stroke-width="0.3"/>
  </g>
</svg>