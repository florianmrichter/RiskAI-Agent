      "begruendung_O": "O=5 (Mäßig, ca. 1× pro Jahr): Die Befüllung erfolgt vollständig manuell aus 10-L-Gebinden in einen Reaktor mit nur 12 L Maximalfüllvolumen. Das Verhältnis Gebindegröße zu Maximalvolumen (10:12) ist ungünstig — ein einziges Gebinde füllt den Reaktor zu 83 %, bei zwei Gebinden wird das Limit um 67 % überschritten. Es existiert keine instrumentelle Füllstandsüberwachung, keine Markierung am Glas, und keine mengenkontrollierende SOP. Bei regelmäßigem Batch-Betrieb mit wechselnden Lösemitteln und wechselnden Bedienern ist eine Fehlbefüllung statistisch wahrscheinlich. Die Fehlhandlungsrate bei manuellen Dosiervorgängen ohne instrumentelle Kontrolle liegt laut CCPS-Literatur bei 1–5 % pro Vorgang. Bei geschätzt 100+ Befüllvorgängen pro Jahr ergibt sich eine Erwartungshäufigkeit von 1–5 Vorfällen pro Jahr.",
      "begruendung_D": "D=6 (Eher schwer zu entdecken): Die Glaswand ermöglicht prinzipiell eine visuelle Kontrolle des Füllstands, was die Detektierbarkeit gegenüber einem opaken Behälter verbessert. Jedoch fehlt jede Referenzmarkierung (keine 12-L-Linie), sodass der Bediener den kritischen Füllstand rein nach Augenmaß einschätzen muss. Bei klaren Lösemitteln und guter Beleuchtung ist die Abweichung von wenigen Litern am zylindrischen Reaktor schwer zu erkennen. Bei trüben, schäumenden oder gefärbten Medien sinkt die visuelle Erkennbarkeit drastisch. Es gibt keinen instrumentellen Sensor, keinen Alarm und kein automatisches Interlock. Die gesamte Detektionskette hängt von einem einzigen Faktor ab: der Aufmerksamkeit des Bedieners im Moment der Befüllung. Nach Abschluss der Befüllung gibt es keinen weiteren Prüfpunkt.",
      "empfehlung": "Primärmaßnahme: Anbringung einer dauerhaften, gut sichtbaren 12-L-Füllstandsmarkierung am Glasreaktor (z.B. PTFE-Ring oder Gravur). Sekundärmaßnahme: Einführung einer verbindlichen Befüll-SOP mit Wiegen der Gebinde vor und nach Befüllung sowie Dokumentation der eingesetzten Menge pro Charge. Tertiärmaßnahme (mittelfristig): Prüfung der Nachrüstbarkeit eines kapazitiven oder optischen Füllstandssensors mit akustischem Alarm bei Erreichen von 11 L (Vorwarnung) und 12 L (Stopp-Signal). Organisatorisch: Schulung aller Bediener zu den Konsequenzen einer Überfüllung, insbesondere im Kontext brennbarer Lösemittel in Ex-Zone 2.",
      "controls_einschraenkung": "Die bestehenden Controls sind unzureichend für eine zuverlässige Verhinderung der Überfüllung. (1) Visuelle Kontrolle durch den Bediener: Rein subjektive Einschätzung ohne Referenzmarkierung. Abhängig von Aufmerksamkeit, Erfahrung und Sichtbedingungen (trübe/schäumende Medien reduzieren Erkennbarkeit erheblich). Keine Wirksamkeit bei Ablenkung oder Routineblindheit. (2) Tropfwanne TW-43: Rein schadensbegrenzend (Severity-Reduction), verhindert nicht die Überfüllung selbst. Begrenzte Kapazität — bei Überfüllung mit gleichzeitigem thermischen Expansion nicht ausreichend. (3) AwSV-Boden: Ebenfalls nur schadensbegrenzend für den Umweltpfad. Keine präventive oder detektive Funktion. Es fehlen vollständig: instrumentelle Füllstandsüberwachung, automatische Abschaltung, Checklisten-basierte Mengenkontrolle, Füllstandsmarkierung am Reaktor.",

      "override_applied": "Safety Override Explosionsschutz: Zone 0 (de facto), brennbare Lösemitteldämpfe, direkte Personenexposition am offenen Handloch → S≥10 gemäß SAFETY_OVERRIDES",
      "kontext_beschreibung": "Das Handloch HL-43 am Büchi miniPilot 15L Glasreaktor dient als Inspektions- und Befüllöffnung im Reaktordeckel. Über diese Öffnung werden brennbare Lösemittel — Ethanol (Flammpunkt 13 °C), Methanol (Flammpunkt 9 °C, giftig, H301+H311+H331), Isopropanol (Flammpunkt 12 °C) und Aceton (Flammpunkt -20 °C, Dampfdruck 240 hPa bei 20 °C) — mittels Fasspumpe aus 10-L-Gebinden eingefüllt. Der Reaktorinnenraum ist bei Lösemittelbetrieb de facto Zone 0 (formal noch nicht klassifiziert), da über der Flüssigkeitsoberfläche ständig eine explosionsfähige Atmosphäre herrscht. Die ATEX-Gerätekategorie 2G (ausgelegt für Zone 1/2) ist für Zone 0 nicht zugelassen.\n\nDer Fehlermodus 'Betrieb mit offenem/undichtem Handloch' beschreibt die Situation, in der der Reaktor bei offenem oder undichtem Handloch unter Heiz- oder Rückflussbedingungen betrieben wird. Dabei entweichen brennbare Lösemitteldämpfe unkontrolliert direkt in den Arbeitsraum (Raum 330, Technikum). Der Dampfaustritt erfolgt am Handloch in Oberkörper-/Gesichtshöhe des Operators, der bei manuellem Betrieb direkt am Reaktor steht. Die RLT-Anlage (Raumlufttechnische Anlage) mit Strömungsüberwachung verdünnt zwar raumweit die Lösemittelkonzentration, kann aber die lokale Konzentration direkt am offenen Handloch nicht ausreichend reduzieren — insbesondere bei Aceton (Dampfdruck 240 hPa) und Methanol (Dampfdruck 128 hPa) bildet sich innerhalb von Sekunden eine zündfähige Atmosphäre im unmittelbaren Umfeld.\n\nDie zentrale Schutzlücke: Es existiert kein technisches Interlock (Verriegelung), das den Heizstart bei offenem Handloch verhindert. Kein Positionsschalter erfasst den Zustand des Handlochs. Kein Gaswarngerät überwacht die Lösemittelkonzentration am Handloch. Die einzige Barriere ist eine Betriebsanweisung (SOP) — eine rein organisatorische Maßnahme, die gegen bewusste Regelverletzungen (z. B. Nachdosierung bei laufendem Prozess) oder schlichten Vergessen keinen Schutz bietet. Dies ist eines der kritischsten Szenarien dieser Anlage, da die Kombination aus Zone 0, fehlender technischer Absicherung und direkter Personenexposition alle Voraussetzungen für einen schwerwiegenden Unfall erfüllt.",
      "begruendung_S": "S = 10 (Gefährlich — Katastrophal, > 1 Mio EUR, Todesfälle): Der Betrieb mit offenem oder undichtem Handloch bei Heiz-/Rückflussbetrieb führt zum unkontrollierten Austritt brennbarer Lösemitteldämpfe direkt in den Arbeitsbereich des Operators. Am offenen Handloch entsteht unter Rückflussbedingungen de facto Zone 0 — eine ständig explosionsfähige Atmosphäre. Die eingesetzten Lösemittel (Ethanol FP 13 °C, Methanol FP 9 °C, Aceton FP -20 °C) haben extrem niedrige Flammpunkte und hohe Dampfdrücke. Methanol brennt mit nahezu unsichtbarer Flamme — der Operator bemerkt eine Entzündung möglicherweise nicht sofort. Bei Zündung durch elektrostatische Entladung, heiße Oberflächen oder Funken entsteht eine Verpuffung oder Stichflamme in direkter Nähe zum Operator (Gesichts-/Oberkörperhöhe). Potenzielle Folgen: schwerste Verbrennungen, tödliche Verletzungen, Glasreaktor-Bersten mit Splitterwurf, Sekundärbrand. Der Safety Override für Explosionsschutz greift zwingend: Zone 0 (explosionsfähige Atmosphäre bei Lösemittelbetrieb), ATEX 2G nur für Zone 1/2 zugelassen, direkte Personenexposition bei personenüberwachtem manuellen Betrieb → mindestens S=10 gemäß SAFETY_OVERRIDES (Explosionsschutz-Spezifikation). Die Wiederbeschaffungskosten des Reaktors (~35.000 EUR) sind für die S-Bewertung sekundär — der Personenschutzaspekt dominiert eindeutig.",
      "begruendung_O": "O = 3 (Gering — ca. 1x in 10 Jahren): Das Handloch wird bei jeder Chargenumstellung geöffnet (Befüllung, Reinigung, Inspektion) — die Gelegenheit für einen Fehlzustand besteht bei jedem Batch-Wechsel. Allerdings ist das Schließen des Handlochs ein bewusster, aktiver Schritt: der schwere Deckel muss aufgesetzt und verschraubt werden. Ein unbewusstes Offenlassen ist daher unwahrscheinlich. Die wahrscheinlicheren Szenarien sind: (1) Bewusste Entscheidung des Operators, das Handloch für Nachdosierung kurz offen zu lassen während der Prozess bereits läuft, (2) Defekte oder falsch eingelegte Dichtung, die trotz geschlossenem Deckel nicht abdichtet, (3) Vergessen nach Unterbrechung (z. B. Telefonanruf während Befüllung). Für bewusste Regelverletzungen liefert die CCPS Human Factors Literature eine Wahrscheinlichkeit von ca. 1x10^-2 pro Gelegenheit. Bei geschätzten 100-200 Batches pro Jahr ergibt sich eine Erwartung von ca. 1-2 Vorfällen pro Jahr — allerdings nicht jeder Vorfall führt zum vollständigen Fehlerzustand (Heizstart bei offenem Handloch). Korrigiert auf den spezifischen Fehlermodus (offenes Handloch UND gleichzeitiger Heizbetrieb) wird O=3 als angemessen eingeschätzt. Datenquelle: Betriebserfahrung, CCPS Human Factors. Für Handloch HL-43 liegen keine CCPS/OREDA-Referenzdaten vor.",
      "begruendung_D": "D = 10 (Absolut unsicher — Nicht erkennbar, ca. 0% Entdeckungswahrscheinlichkeit): Für den Fall einer undichten Dichtung bei geschlossenem Handlochdeckel existiert keine Entdeckungsmöglichkeit. Es gibt keinen Positionsschalter, der den Verschlusszustand des Handlochs erfasst. Es gibt keinen Gasdetektor am Handloch oder im Nahbereich des Reaktorkopfs, der austretende Lösemitteldämpfe messen würde. Die Lösemitteldämpfe (insbesondere Methanol) sind geruchsarm bis geruchlos und die RLT-Anlage verdünnt die Raumluft, was die olfaktorische Erkennung zusätzlich erschwert. Der Operator selbst, der das Handloch offen gelassen hat, wird seinen eigenen bewussten Entscheid nicht als Fehler erkennen ('ich schließe gleich wieder'). Bei einer defekten Dichtung ist der Fehlerzustand visuell nicht erkennbar — das Handloch erscheint geschlossen. Erst bei einer Zündung wird der Zustand erkannt — dann ist es zu spät. Die einzige theoretische Detection-Möglichkeit wäre die Sichtkontrolle durch einen zweiten Operator, die aber im normalen Technikumsbetrieb nicht standardmäßig vorgesehen ist. Fazit: Ohne technische Sensorik (Positionsschalter, Gasdetektor) ist die Entdeckungswahrscheinlichkeit praktisch null.",
      "empfehlung": "PFLICHT-Maßnahme aufgrund S=10 (Safety Override Explosionsschutz, Zone 0) und RPZ=300 (kritisch): Primär empfohlen wird die Installation eines Positionsschalters (induktiver Sensor oder Reed-Kontakt, ATEX-zertifiziert) am Handloch HL-43, dessen Signal als hardverdrahtetes Interlock zum Thermostat PU geführt wird — bei offenem Handloch wird der Heizkreislauf gesperrt, der Thermostat kann erst heizen, wenn das Handloch nachweislich geschlossen ist. Diese Maßnahme eliminiert den gefährlichsten Bedienfehler (Heizstart bei offenem Handloch) auf technischer Ebene. Ergänzend wird eine Gaswarneinrichtung (katalytischer oder IR-Sensor) im Bereich des Reaktorkopfs empfohlen, die bei 20% UEG optischen und akustischen Alarm auslöst — dies macht die unsichtbare Gefahr sichtbar und schützt auch gegen undichte Dichtungen. In Kombination sinkt die RPZ auf 30 (niedrig). Als Sofortmaßnahme bis zur technischen Umsetzung: Erweiterung der Chargenfreigabe-Checkliste um den expliziten Prüfpunkt 'Handloch geschlossen und Verschluss geprüft — Dichtung intakt'.",
      "controls_einschraenkung": "Die bestehenden Controls sind für diesen Fehlermodus grundlegend unzureichend. Die Betriebsanweisung (SOP 'Handloch vor Heizstart schließen') ist eine rein organisatorische Maßnahme — sie verhindert weder einen bewussten Verstoß (Nachdosierung bei laufendem Prozess) noch schützt sie vor einer defekten Dichtung. Die RLT-Anlage verdünnt die Lösemitteldämpfe raumweit unter die Explosionsgrenze, kann aber die lokale Konzentration direkt am offenen Handloch nicht beherrschen — bei Aceton-Rückfluss (56 °C, Dampfdruck 240 hPa) bildet sich innerhalb von Sekunden eine zündfähige Atmosphäre im Bereich von 30-50 cm um die Öffnung. Die Folienbeschichtung FB-43 (Splitterschutz) mindert nur die Folgen eines Glasbruchs, verhindert aber weder die Zündung noch den Dampfaustritt. Es fehlt jegliche technische Detection-Maßnahme: kein Positionsschalter am Handloch, kein Gasdetektor, kein Interlock zum Thermostat. Die Kombination aus rein organisatorischer Prevention und fehlender technischer Detection ergibt eine Schutzlücke, die bei S=10 (Explosionsschutz-Override) nicht akzeptabel ist.",

function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function deltaClass(d) {
  if (Math.abs(d) === 0) return 'delta-ok';
  if (Math.abs(d) <= 1) return 'delta-warn';
  return 'delta-bad';
}

function renderOutputs() {
  const panel = document.getElementById('outputs');
  let html = '<nav>';
  const evalNames = [...new Set(runs.map(r => r.eval_name))];
  evalNames.forEach((name, i) => {
    html += `<button class="${i===0?'active':''}" onclick="filterEval('${name}', this)">${name}</button>`;
  });
  html += '</nav><div id="runs-container"></div>';
  panel.innerHTML = html;
  filterEval(evalNames[0], document.querySelector('nav button'));
}

function filterEval(name, btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const container = document.getElementById('runs-container');
  const filtered = runs.filter(r => r.eval_name === name);
  let html = `<p style="margin:10px 0;color:#8b949e">Prompt: ${filtered[0]?.prompt || ''}</p>`;
  
  filtered.forEach(r => {
    const g = r.grading;
    const passRate = g.pass_rate || 0;
    const badgeClass = passRate === 1 ? 'badge-pass' : passRate >= 0.5 ? 'badge-warn' : 'badge-fail';
    const variantBadge = r.variant === 'with_skill' ? 'badge-skill' : 'badge-baseline';
    const variantLabel = r.variant === 'with_skill' ? 'Mit Skill' : 'Baseline';
    
    html += `<div class="run">`;
    html += `<div class="run-header">`;
    html += `<span><span class="badge ${variantBadge}">${variantLabel}</span> ${r.eval_name}</span>`;
    html += `<span class="badge ${badgeClass}">${g.passed_assertions||0}/${g.total_assertions||0} (${(passRate*100).toFixed(0)}%)</span>`;
    html += `</div>`;
    
    // S/O/D display
    const res = r.result;
    const deltas = g.sod_deltas || {};
    html += `<div class="sod">`;
    ['S','O','D'].forEach(f => {
      const val = res[f] || '?';
      const d = deltas[f] || {};
      const delta = d.delta || 0;
      const gold = d.gold || '?';
      html += `<div class="sod-item"><div class="sod-value ${deltaClass(delta)}">${val}</div>`;
      html += `<div class="sod-gold">${f} (Gold: ${gold}, Δ${delta>=0?'+':''}${delta})</div></div>`;
    });
    html += `<div class="sod-item"><div class="sod-value">${res.rpz||'?'}</div>`;
    html += `<div class="sod-gold">RPZ (${res.rpz_status||'?'})</div></div>`;
    html += `</div>`;
    
    // Assertions
    if (g.expectations) {
      html += `<h3>Assertions</h3>`;
      g.expectations.forEach(e => {
        const cls = e.passed ? 'assertion-pass' : 'assertion-fail';
        const icon = e.passed ? '✓' : '✗';
        html += `<div class="assertion ${cls}">${icon} ${e.text}<div class="evidence">${e.evidence}</div></div>`;
      });
    }
    
    // Text previews
    const fields = ['kontext_beschreibung', 'empfehlung', 'controls_einschraenkung', 'begruendung_S', 'begruendung_O', 'begruendung_D'];
    html += `<details style="margin-top:12px"><summary style="cursor:pointer;color:#58a6ff">Textfelder anzeigen</summary>`;
    fields.forEach(f => {
      const text = res[f] || '';
      if (text) html += `<h3>${f} (${text.length}z)</h3><div class="text-preview">${text}</div>`;
    });
    html += `</details>`;
    
    // Timing
    const t = r.timing;
    if (t.total_tokens) {
      html += `<div style="margin-top:10px">`;
      html += `<span class="metric"><span class="metric-value">${(t.total_tokens/1000).toFixed(1)}k</span><br><span class="metric-label">Tokens</span></span>`;
      html += `<span class="metric"><span class="metric-value">${t.total_duration_seconds?.toFixed(0)||'?'}s</span><br><span class="metric-label">Dauer</span></span>`;
      html += `</div>`;
    }
    
    html += `</div>`;
  });
  
  container.innerHTML = html;
}

  html += '</div>';
  
  // Per-eval table
  html += '<h2>Per-Eval Breakdown</h2><table><tr><th>Eval</th><th>Variante</th><th>Pass Rate</th><th>S Δ</th><th>O Δ</th><th>D Δ</th><th>Tokens</th><th>Dauer</th></tr>';
  benchmark.configurations.forEach(cfg => {
    cfg.evals.forEach(ev => {
      const d = ev.sod_deltas;
      html += `<tr>`;
      html += `<td>${ev.eval_name}</td>`;
      html += `<td>${cfg.label}</td>`;
      html += `<td>${(ev.pass_rate*100).toFixed(0)}%</td>`;
      html += `<td class="${deltaClass(d.S)}">${d.S>=0?'+':''}${d.S}</td>`;
      html += `<td class="${deltaClass(d.O)}">${d.O>=0?'+':''}${d.O}</td>`;
      html += `<td class="${deltaClass(d.D)}">${d.D>=0?'+':''}${d.D}</td>`;
      html += `<td>${(ev.tokens/1000).toFixed(1)}k</td>`;
      html += `<td>${ev.duration_seconds.toFixed(0)}s</td>`;
      html += `</tr>`;
    });
  });
  html += '</table>';
  
  // Observations
  html += '<h2>Analyst Observations</h2>';
  benchmark.analyst_observations.forEach(obs => {
    let cls = 'observation';
    if (obs.startsWith('SKILL STÄRKE')) cls += ' obs-strength';
    else if (obs.startsWith('SKILL SCHWÄCHE')) cls += ' obs-weakness';
    else cls += ' obs-surprise';
    html += `<div class="${cls}">${obs}</div>`;
  });
  
  panel.innerHTML = html;
}

renderOutputs();
renderBenchmark();
</script>
</body>
</html>
